<!DOCTYPE html>
<html>
<head>
    <title>Smart Panel</title>

    <style>
        body {
            font-family: Arial;
            background:#eef2f3;
        }

        .container {
            width:350px;
            margin:80px auto;
            padding:20px;
            background:white;
            border-radius:10px;
            text-align:center;
            box-shadow:0 0 10px gray;
        }

        input {
            width:90%;
            padding:10px;
            margin:10px;
            border-radius:5px;
            border:1px solid gray;
        }

        button {
            padding:10px 15px;
            margin:5px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            background:blue;
            color:white;
        }

        #result {
            margin-top:15px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container" id="box">

    <h2>User Panel</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="number" id="num1" placeholder="Number 1">
    <input type="number" id="num2" placeholder="Number 2">

    <button onclick="process()">Submit</button>

    <p id="result"></p>

</div>

<script>

function process() {

    let name = document.getElementById("name").value;
    let n1 = Number(document.getElementById("num1").value);
    let n2 = Number(document.getElementById("num2").value);

    let res = document.getElementById("result");
    let box = document.getElementById("box");

    if (name == "" || n1 == "" || n2 == "") {
        res.innerHTML = "Please fill all fields";
        res.style.color = "red";
        box.style.backgroundColor = "#ffe0e0";
    }
    else {

        let sum = n1 + n2;

        if (sum > 100) {
            res.innerHTML = name + " your sum is HIGH: " + sum;
            res.style.color = "green";
            box.style.backgroundColor = "#d4edda";
        }
        else {
            res.innerHTML = name + " your sum is LOW: " + sum;
            res.style.color = "orange";
            box.style.backgroundColor = "#fff3cd";
        }
    }
}

</script>

</body>
</html>
