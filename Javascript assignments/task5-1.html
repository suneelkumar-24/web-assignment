<!-- Show Sum -->
<!DOCTYPE html>
<html>
<head>
    <title>Sum</title>
    <style>
        body { text-align:center; font-family:Arial; background:#eee; }
        .box {
            width:300px; margin:100px auto;
            padding:20px; background:white;
            border-radius:10px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2 id="result">0</h2>
    <button onclick="calc()">Calculate</button>
</div>

<script>
function calc() {
    let a = 10;
    let b = 20;
    let sum = a + b;

    document.getElementById("result").innerHTML = sum;
}
</script>

</body>
</html>
