<!-- Show Full Message -->
<!DOCTYPE html>
<html>
<head>
    <title>Message</title>
    <style>
        body { font-family:Arial; text-align:center; background:#f4f4f4; }
        .card {
            width:300px; margin:100px auto;
            padding:20px; background:white;
            border-radius:10px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2 id="msg">Message will appear</h2>
    <button onclick="show()">Show Message</button>
</div>

<script>
function show() {
    let name = "Suneel";
    let age = 20;

    let message = "My name is " + name + " and I am " + age + " years old";

    document.getElementById("msg").innerHTML = message;
}
</script>

</body>
</html>
