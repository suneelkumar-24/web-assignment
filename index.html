<!doctype html>
<html lang="en">
  <head>
    <title>Web Assignments Dashboard</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: #0f172a;
        color: white;
      }

      header {
        background: #1e293b;
        padding: 20px;
        text-align: center;
        font-size: 28px;
        font-weight: bold;
      }

      .container {
        padding: 30px;
      }

      h2 {
        margin-top: 40px;
        border-left: 5px solid #38bdf8;
        padding-left: 10px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 15px;
        margin-top: 20px;
      }

      .card {
        background: #1e293b;
        padding: 15px;
        text-align: center;
        border-radius: 10px;
        transition: 0.3s;
      }

      .card:hover {
        background: #334155;
        transform: translateY(-5px);
      }

      a {
        text-decoration: none;
        color: white;
      }

      footer {
        text-align: center;
        padding: 20px;
        background: #1e293b;
        margin-top: 40px;
      }
    </style>
  </head>

  <body>
    <header>Web Assignments Dashboard 🚀</header>

    <div class="container">
      <h2>HTML Assignments</h2>
      <div class="grid" id="htmlBox"></div>

      <h2>JavaScript Tasks</h2>
      <div class="grid" id="jsBox"></div>

      <h2>Programming Practice</h2>
      <div class="grid" id="progBox"></div>
    </div>

    <footer>Made by <a href="https://fb.com/suneelnakhtani" style="color: yellow;text-decoration: underline;">Sir Suneel</a> 💻🔥</footer>

    <script>
      async function loadData() {
        let res = await fetch("data.json");
        let data = await res.json();

        let htmlBox = document.getElementById("htmlBox");
        let jsBox = document.getElementById("jsBox");
        let progBox = document.getElementById("progBox");

        data.html.forEach((file, i) => {
          createCard(htmlBox, file, "Ass " + (i + 1));
        });

        data.js.forEach((file, i) => {
          createCard(jsBox, file, "Task " + (i + 1));
        });

        data.programming.forEach((file) => {
          createCard(progBox, file.path, file.name);
        });
      }

      function createCard(container, path, text) {
        let a = document.createElement("a");
        a.href = path;
        a.target = "_blank";

        let div = document.createElement("div");
        div.className = "card";
        div.innerText = text;

        a.appendChild(div);
        container.appendChild(a);
      }

      loadData();
      // async function loadData() {
      //   let res = await fetch("data.json");
      //   let data = await res.json();

      //   console.log(data); // test
      // }

    </script>
  </body>
</html>
